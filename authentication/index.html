<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuickPG | Premium Living</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fff; }
        
        /* Neon Glow Effect */
        .neon-glow { box-shadow: 0 0 20px rgba(59, 130, 246, 0.3); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Typography */
        .hero-text { background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed w-full z-50 p-6 flex justify-between items-center bg-transparent backdrop-blur-md border-b border-white/5">
        <div class="text-xl font-black tracking-tighter">QUICK<span class="text-blue-500">PG</span></div>
        <div class="space-x-8 text-sm uppercase tracking-widest font-light text-gray-400">
            <a href="#" class="hover:text-blue-400 transition">Find PG</a>
            <a href="#" class="hover:text-blue-400 transition">Co-living</a>
            <button class="px-6 py-2 border border-white/20 rounded-full hover:bg-white hover:text-black transition">Log In</button>
        </div>
    </nav>

    <section class="h-screen flex flex-col justify-center items-center text-center p-6 relative">
        <div class="absolute inset-0 z-0 opacity-20 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-blue-900 to-transparent"></div>
        
        <h1 id="hero-title" class="text-7xl md:text-9xl font-black mb-6 hero-text relative z-10">Find Your<br>Perfect Space.</h1>
        <p id="hero-sub" class="text-gray-400 text-lg md:text-xl mb-12 max-w-lg relative z-10">Verified, luxury-standard PGs in your city. Move in without the stress.</p>

        <div id="hero-search" class="glass p-3 rounded-full flex items-center w-full max-w-lg relative z-10 neon-glow">
            <input type="text" placeholder="Enter locality or landmark..." class="bg-transparent w-full px-6 py-3 outline-none text-white placeholder-gray-500">
            <button class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold hover:bg-blue-500 transition">Search</button>
        </div>
    </section>

    <section class="py-32 px-10 max-w-5xl mx-auto">
        <h2 class="text-3xl font-bold mb-16 border-l-4 border-blue-500 pl-4">Popular Choices</h2>
        
        <div class="space-y-8">
            <div class="glass p-8 rounded-2xl flex items-center justify-between hover:border-blue-500/50 transition">
                <div>
                    <h3 class="text-2xl font-bold">Modern PG in Indiranagar</h3>
                    <p class="text-gray-400">Spacious rooms with WiFi and meals.</p>
                </div>
                <div class="text-right font-bold text-blue-400 text-xl">₹10,000/mo</div>
            </div>

            <div class="glass p-8 rounded-2xl flex items-center justify-between hover:border-blue-500/50 transition">
                <div>
                    <h3 class="text-2xl font-bold">Cozy PG in Koregaon Park</h3>
                    <p class="text-gray-400">Budget-friendly rooms with basic amenities.</p>
                </div>
                <div class="text-right font-bold text-blue-400 text-xl">₹7,500/mo</div>
            </div>
        </div>
    </section>

    <script>
        // GSAP Animations
        const tl = gsap.timeline({defaults: {ease: "power4.out"}});

        tl.fromTo("#hero-title", {y: 100, opacity: 0}, {y: 0, opacity: 1, duration: 1.5})
          .fromTo("#hero-sub", {y: 20, opacity: 0}, {y: 0, opacity: 1, duration: 1}, "-=1")
          .fromTo("#hero-search", {scale: 0.9, opacity: 0}, {scale: 1, opacity: 1, duration: 1}, "-=0.5");

        // Scroll Reveal for Listing
        gsap.fromTo("section:nth-child(3)", 
            {opacity: 0, y: 50}, 
            {opacity: 1, y: 0, duration: 1, scrollTrigger: {trigger: "section:nth-child(3)", start: "top 80%"}}
        );
    </script>
</body>
</html>
